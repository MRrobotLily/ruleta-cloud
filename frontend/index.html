<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Cloud</title>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

.ruleta{
    width:300px;
    height:300px;
    border-radius:50%;
    border:10px solid white;

    margin:50px auto;

    background:
    conic-gradient(
        red 0deg 60deg,
        blue 60deg 120deg,
        green 120deg 180deg,
        yellow 180deg 240deg,
        purple 240deg 300deg,
        orange 300deg 360deg
    );

    transition: transform 4s ease-out;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🎡 Ruleta Cloud</h1>

<div class="ruleta" id="ruleta"></div>

<button onclick="girar()">Girar</button>

<h2 id="resultado"></h2>

<script>

function girar(){

    const ruleta = document.getElementById("ruleta");

    const grados = Math.floor(Math.random()*5000);

    ruleta.style.transform = `rotate(${grados}deg)`;

    const premios = [
        "Dinero",
        "Viaje",
        "Laptop",
        "Celular",
        "Nada",
        "Premio sorpresa"
    ];

    const premio = premios[Math.floor(Math.random()*premios.length)];

    setTimeout(()=>{

        document.getElementById("resultado").innerHTML =
            "Ganaste: " + premio;

        guardarResultado(premio);

    },4000);
}

async function guardarResultado(premio){

	await fetch("/guardar",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            premio: premio
        })

    });

}

</script>

</body>
</html>
